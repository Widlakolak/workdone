spring:
  application:
    name: backend
  
  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:workdonesql}
    username: ${DB_USERNAME:devuser}
    password: ${DB_PASSWORD:devpassword}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat: { options: { model: gpt-4o-mini } }
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat: { options: { model: gemini-2.5-flash-lite } }
    groq:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      model: llama-3.3-70b-versatile
    cohere:
      api-key: ${COHERE_API_KEY}

    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka-workdone:9092}
    consumer:
      group-id: workdone-analyzer-group
      auto-offset-reset: earliest

workdone:
  profile:
    input-directory: /data/workdone/profile-input
  matching:
    ai-threshold-min: 50.0
    ai-threshold-max: 85.0
    instant-threshold: 90.0
    digest-threshold: 60.0
    archive-threshold: 40.0
    semantic-threshold: 70.0
    must-have-keywords: [ "java", "spring boot", "sql" ]
  scheduling:
    ingestion-cron: "0 0 */2 * * *"
    digest-cron: "0 0 18 * * *"
    zone-id: Europe/Warsaw
  discord:
    public-key: ${DISCORD_PUBLIC_KEY}
    instant:
      enabled: ${DISCORD_INSTANT_ENABLED:true}
      url: ${DISCORD_INSTANT_URL:}
    digest:
      enabled: ${DISCORD_DIGEST_ENABLED:true}
      url: ${DISCORD_DIGEST_URL:}
  providers:
    rss:
      enabled: true
      sources:
        - name: "RemoteOK"
          url: "https://remoteok.com/remote-java-jobs.rss"
        - name: "WeWorkRemotely"
          url: "https://weworkremotely.com/categories/remote-back-end-programming-jobs.rss"
    remotive:
      enabled: true
      base-url: "https://remotive.com/api"
    jooble:
      enabled: true
      priority: HIGH
      api-key: ${JOOBLE_API_KEY}
      base-url: https://jooble.org/api
      filters:
        keywords: "java, spring boot, sql"
        location: "Łódź"
        radius: "50"
        allow-remote: true
    jobicy:
      enabled: true
      priority: MEDIUM
      base-url: "https://jobicy.com/api/v2/remote-jobs"
      filters:
        count: 50
        geo: ""
        industry: "engineering" 
        tag: "java, spring boot"
