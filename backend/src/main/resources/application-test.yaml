spring:
  jpa:
    enabled: false
  flyway:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy}
    google:
      genai:
        api-key: ${GEMINI_API_KEY:dummy}
    groq:
      api-key: ${GROQ_API_KEY:dummy}
      base-url: https://api.groq.com/openai
      model: llama-3.3-70b-versatile
    cohere:
      api-key: ${COHERE_API_KEY:dummy}

workdone:
  discord:
    public-key: ${DISCORD_PUBLIC_KEY:1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef}
