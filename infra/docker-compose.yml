version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: shared-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: sharedpassword
    volumes:
      - /share/CACHEDEV1_DATA/Container/shared-postgres:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - infrastructure-net

  kafka:
    image: bitnami/kafka:3.6
    container_name: workdone-kafka
    restart: unless-stopped
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - infrastructure-net
    
    workdone-backend:
    image: ghcr.io/widlakolak/workdone/backend:latest
    container_name: workdone-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/workdone
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - /share/CACHEDEV1_DATA/Container/workdone/profile-input:/data/workdone/profile-input
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - infrastructure-net

  #  cloudflare:
  #      image: cloudflare/cloudflared:latest
  #      restart: unless-stopped
  #      command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
  #      networks:
  #      - infrastructure-net

networks:
  infrastructure-net:
    driver: bridge