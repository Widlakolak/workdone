version: '3.8'

services:
  # 1. Baza danych z obsługą wektorów AI (pgvector)
  postgres:
    image: ankane/pgvector:latest
    container_name: workdone-postgres
    environment:
      POSTGRES_DB: workdone
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. Apache Kafka w trybie KRaft
  kafka:
    image: bitnami/kafka:3.6
    container_name: workdone-kafka
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
    ports:
      - "9094:9094"
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  # 3. Cloudflare Tunnel (Przygotowany pod Sprint 4)
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: workdone-tunnel
  #   command: tunnel run --token ${CLOUDFLARE_TOKEN}
  #   restart: unless-stopped

volumes:
  pgdata: